name: X Auto Post (USJ-815)

on:
  schedule:
    - cron: '0 11 * * *'  # 毎日 20:00 JST (= 11:00 UTC)
  workflow_dispatch:       # GitHub画面から手動実行も可能

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install tweepy

      - name: Post tweet
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: python post_x_scheduled.py

      - name: Save state to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add x_post_state.json x_post_log.txt
          git diff --staged --quiet || git commit -m "chore: update X post state [skip ci]"
          git push
