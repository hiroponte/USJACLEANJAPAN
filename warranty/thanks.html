<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ完了 | Daiwa Felicity 製品保証</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans JP', sans-serif; background: #F0F6FF; color: #1A2744; min-height: 100vh; display: flex; flex-direction: column; }
        .header {
            background: #1A2744;
            padding: 18px 24px;
            display: flex;
            align-items: center;
        }
        .brand-name { color: #fff; font-family: 'Outfit', sans-serif; font-size: 1.3rem; font-weight: 700; letter-spacing: 0.05em; }
        .brand-sub { color: rgba(255,255,255,0.55); font-size: 0.75rem; margin-top: 2px; }
        .main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
        }
        .card {
            background: #fff;
            border-radius: 20px;
            padding: 56px 48px;
            max-width: 520px;
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 24px rgba(26,39,68,0.08);
        }
        .icon {
            width: 72px;
            height: 72px;
            background: #E8F5E9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }
        .icon i { font-size: 2rem; color: #2E7D32; }
        h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 16px; color: #1A2744; }
        p { font-size: 0.97rem; color: #4A5568; line-height: 1.8; margin-bottom: 12px; }
        .note {
            background: #F0F6FF;
            border-radius: 10px;
            padding: 16px 20px;
            font-size: 0.88rem;
            color: #4A5568;
            margin: 24px 0;
            text-align: left;
        }
        .note i { color: #2176CC; margin-right: 6px; }
        .btn {
            display: inline-block;
            margin-top: 8px;
            padding: 14px 32px;
            background: #2176CC;
            color: #fff;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.95rem;
        }
        .btn:hover { background: #1558A0; }
        footer {
            background: #1A2744;
            color: rgba(255,255,255,0.5);
            text-align: center;
            padding: 20px;
            font-size: 0.82rem;
        }
        @media (max-width: 600px) {
            .card { padding: 36px 24px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div>
            <div class="brand-name">Daiwa Felicity</div>
            <div class="brand-sub">製品保証・サポート</div>
        </div>
    </header>

    <main class="main">
        <div class="card">
            <div class="icon"><i class="fas fa-check"></i></div>
            <h1>お問い合わせを受け付けました</h1>
            <p>ご連絡いただきありがとうございます。<br>内容を確認のうえ、担当者よりご返答いたします。</p>
            <div class="note">
                <p><i class="fas fa-clock"></i> 通常2営業日以内にご登録のメールアドレスへご連絡します。</p>
                <p style="margin-top:8px;"><i class="fas fa-envelope"></i> 返信が届かない場合は、迷惑メールフォルダをご確認ください。</p>
            </div>
            <a href="/warranty/" class="btn">保証サポートページに戻る</a>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 USJACLEAN Japan Inc. All Rights Reserved.</p>
    </footer>
</body>
</html>
